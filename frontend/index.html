<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a237e">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <title>Pradeep's HexR</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/splash.js"></script>
</head>
<body>
  <header>
    <div class="logo">⬡ Pradeep's HexR</div>
    <p class="tagline">Your personal hexagonal QR code</p>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="encoder">Encode</button>
    <button class="tab"        data-tab="scanner">Scan</button>
  </nav>

  <!-- ── Encoder ─────────────────────────────────────── -->
  <section id="encoder" class="panel active">
    <label for="enc-input">Text to encode</label>
    <textarea id="enc-input" rows="4" maxlength="500" placeholder="Type anything…"></textarea>
    <div class="char-count"><span id="char-count">0</span> / 500 characters</div>

    <button id="enc-btn" class="primary-btn">Generate HexR</button>

    <div id="enc-result" class="result hidden">
      <img id="enc-img" alt="HexR code" />
      <button id="enc-share" class="primary-btn hidden">Share</button>
      <div class="enc-actions">
        <button id="enc-copy" class="secondary-btn">Copy image</button>
        <a id="enc-download" class="secondary-btn" download="hexr.png">Download PNG</a>
      </div>
    </div>

    <div id="enc-error" class="error hidden"></div>
    <div id="enc-spinner" class="spinner hidden"></div>
  </section>

  <!-- ── Scanner ─────────────────────────────────────── -->
  <section id="scanner" class="panel">
    <p class="hint">Take a photo of a HexR code or pick one from your gallery.</p>

    <div class="scan-btns">
      <label class="primary-btn file-label" for="scan-camera">📷 Camera</label>
      <input type="file" id="scan-camera" accept="image/*" capture="environment" class="sr-only">

      <label class="secondary-btn file-label" for="scan-gallery">🖼 Gallery</label>
      <input type="file" id="scan-gallery" accept="image/*" class="sr-only">
    </div>

    <div id="scan-preview-wrap" class="hidden">
      <img id="scan-preview" alt="Selected image" />
    </div>

    <div id="scan-result" class="result hidden">
      <div class="decoded-label">Decoded text:</div>
      <div id="scan-text" class="decoded-text"></div>
      <button id="scan-copy" class="secondary-btn">Copy</button>
    </div>

    <div id="scan-error" class="error hidden"></div>
    <div id="scan-spinner" class="spinner hidden"></div>
  </section>

  <footer class="site-footer">⬡ HexR · by Pradeep · 2026</footer>

  <script src="/app.js"></script>
</body>
</html>
